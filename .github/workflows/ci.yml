name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc, i686-pc-windows-msvc]

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install x86 target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}
      
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Show toolchain
        run: rustc -Vv && cargo -V

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Linting
        run: cargo clippy --target ${{ matrix.target }} --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --target ${{ matrix.target }} --all-features -- --test-threads=1

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build docs
        run: cargo doc --no-deps --target ${{ matrix.target }}

  cfg-guard:
    name: Control Flow Guard build
    runs-on: windows-latest
    env:
      # Build the whole graph with Control Flow Guard so the process enforces CFG
      # and every indirect call is instrumented. Confirms CFG-aware hooking keeps
      # hooks correct while registering call targets via SetProcessValidCallTargets.
      RUSTFLAGS: "-C control-flow-guard=yes"
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: cfg-guard

      - name: Test with Control Flow Guard enabled
        run: cargo test --target x86_64-pc-windows-msvc -- --test-threads=1