name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc, i686-pc-windows-msvc]

    steps:
      - uses: actions/checkout@v4

      - name: Install x86 target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}
      
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Show toolchain
        run: rustc -Vv && cargo -V

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Linting
        run: cargo clippy --target ${{ matrix.target }} --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --target ${{ matrix.target }} --all-features -- --test-threads=1

      - name: Build, Link and Run C++ FFI Test (G++)
        shell: bash
        run: |
          LIB_PATH="target/${{ matrix.target }}/release/neohook.lib"
          
          echo "Compiling and Linking C++ Test..."
          g++ tests/ffi_full_test.cpp -I include "$LIB_PATH" \
              -o ffi_test.exe \
              -luser32 -lkernel32 -ladvapi32 -lws2_32 -lbcrypt -luserenv -lntdll
          
          echo "Running FFI Test Execution..."
          ./ffi_test.exe

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build docs
        run: cargo doc --no-deps --target ${{ matrix.target }}